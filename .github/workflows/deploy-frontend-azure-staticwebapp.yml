name: Deploy Frontend to Azure Static Web Apps

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/ParkEase-frontend/**"
      - ".github/workflows/deploy-frontend-azure-staticwebapp.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ]; then
            echo "Missing AZURE_STATIC_WEB_APPS_API_TOKEN secret"
            exit 1
          fi
          if [ -z "${{ secrets.REACT_APP_API_BASE_URL }}" ]; then
            echo "Missing REACT_APP_API_BASE_URL secret"
            exit 1
          fi

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/ParkEase-frontend
          output_location: build
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
